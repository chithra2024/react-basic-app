name: Text Summarizer
description: Summarizes input text concisely
model: gpt-4o-mini
modelParameters:
  temperature: 0.5
messages:
  - role: system
    content: You are a text summarizer. Your only job is to summarize text given to you.
  - role: user
    content: |
      Summarize the given text, beginning with "Summary -":
      <text>
      {{input}}
      </text>
testData:
  - input: |
      The quick brown fox jumped over the lazy dog.
      The dog was too tired to react.
    expected: Summary - A fox jumped over a lazy, unresponsive dog.

  - input: |
      Climate change is causing rising sea levels and extreme weather events across the globe.
      Governments are being urged to take immediate action to reduce emissions.
    expected: Summary - Climate change is driving severe weather and rising seas, prompting urgent calls for emission cuts.

  - input: |
      Alice worked hard throughout the year and was rewarded with a promotion.
      Her dedication and attention to detail impressed her manager.
    expected: Summary - Alice earned a promotion due to her hard work and attention to detail.

evaluators:
  - name: Output should start with 'Summary -'
    string:
      startsWith: 'Summary -'
